services:
  biblioteca:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca
    env_file: .env
#    ports:
#      - "4000:4000"
    depends_on:
      - postgres
    networks:
      - biblioteca_net
      - caddy_net
    restart: unless-stopped

  postgres:
    image: postgres:18-bookworm
    container_name: 'biblioteca-pg'
    env_file: .env
#    ports:
#      - '5432:5432'
    volumes:
      - ./dbinit:/docker-entrypoint-initdb.d
      - biblioteca-pgdata:/var/lib/postgresql
    networks:
      - biblioteca_net
    restart: unless-stopped

volumes:
  biblioteca-pgdata:

networks:
  biblioteca_net:
    driver: bridge
  caddy_net:
    external: true