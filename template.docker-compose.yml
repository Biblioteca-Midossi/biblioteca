services:
  biblioteca:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca
    env_file: .env
    ports: ["4000:4000"]
    depends_on:
      - dragonfly
      - postgres
    networks:
      - biblioteca_net
      - caddy_net
    restart: unless-stopped

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: 'biblioteca-df'
    ports:
      - '6379:6379'
    volumes:
      - biblioteca-dfdata:/data
    networks:
      - biblioteca_net
    restart: unless-stopped

  postgres:
    image: postgres:18-bookworm
    container_name: 'biblioteca-pg'
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - biblioteca-pgdata:/var/lib/postgresql
      - ./dbinit:/docker-entrypoint-initdb.d
    networks:
      - biblioteca_net
    restart: unless-stopped

volumes:
  biblioteca-dfdata:
  biblioteca-pgdata:

networks:
  biblioteca_net:
    driver: bridge
  caddy_net:
    external: true